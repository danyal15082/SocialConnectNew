apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
apply plugin: "com.google.gms.google-services"

if (System.properties['os.name'].toLowerCase().contains('windows')) {
    layout.buildDirectory.set(file("C:/S/app"))
}

def generatedAutolinkingSourceDir = file("${projectDir}/build/generated/autolinking/src/main/jni")
def generatedAutolinkingTargetDir = file("C:/S/app/generated/autolinking/src/main/jni")

afterEvaluate {
    def autolinkingTask = tasks.findByName("generateAutolinkingNewArchitectureFiles")
    if (autolinkingTask != null) {
        autolinkingTask.doLast {
            if (generatedAutolinkingSourceDir.exists()) {
                generatedAutolinkingTargetDir.mkdirs()
                copy {
                    from generatedAutolinkingSourceDir
                    into generatedAutolinkingTargetDir
                }
            }
        }
    }
}

/**
 * This is the configuration block to customize your React Native Android app.
 */
react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = false

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    buildFeatures {
        prefab true
    }

    namespace "com.socialconnectnew"

    defaultConfig {
        applicationId "com.socialconnectnew"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"

        externalNativeBuild {
            cmake {
                arguments "-DCMAKE_OBJECT_PATH_MAX=128"
                buildStagingDirectory = file("C:/S/app/.cxx")
            }
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }

        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {

    implementation("com.facebook.react:react-android")

    // Optional only if you want native Firebase Analytics
    // implementation platform("com.google.firebase:firebase-bom:34.15.0")
    // implementation("com.google.firebase:firebase-analytics")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}