buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")

        // Firebase
        classpath("com.google.gms:google-services:4.4.3")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    if (System.properties['os.name'].toLowerCase().contains('windows') && project != rootProject) {
        // Use a short build path for subprojects to avoid Windows long-path issues.
        // Keep the root project on its normal build directory so React Native autolinking
        // can resolve the generated autolinking.json file at the expected location.
        def pathHash = Integer.toHexString(project.path.hashCode())
        def tempBuildDir = new File("C:/S/${pathHash}")
        project.layout.buildDirectory.set(tempBuildDir)
    }

    // Help with long paths in CMake on Windows
    if (!project.state.executed) {
        project.afterEvaluate {
            if (project.extensions.findByName('android') != null) {
                project.android.defaultConfig.externalNativeBuild.cmake {
                    arguments "-DCMAKE_OBJECT_PATH_MAX=128"
                }
            }
        }
    }
}
